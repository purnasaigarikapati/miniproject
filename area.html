<!DOCTYPE html>
<html>
<head>
    <title>Land Area Calculator</title>
</head>
<body>

<h1>Land Area Calculator</h1>

<hr>

<h2>1. Square</h2>
<form>
    <label>Side Length:</label><br>
    <input type="number" name="side"><br><br>
    <p><b>Formula:</b> Area = side × side</p>
</form>

<hr>

<h2>2. Rectangle</h2>
<form>
    <label>Length:</label><br>
    <input type="number" name="length"><br><br>

    <label>Width:</label><br>
    <input type="number" name="width"><br><br>

    <p><b>Formula:</b> Area = length × width</p>
</form>

<hr>

<h2>3. Triangle</h2>
<form>
    <label>Base:</label><br>
    <input type="number" name="base"><br><br>

    <label>Height:</label><br>
    <input type="number" name="height"><br><br>

    <p><b>Formula:</b> Area = ½ × base × height</p>
</form>

<hr>

<p><i>Note: This calculator uses only HTML.  
Calculation must be done manually using the formulas above.</i></p>

</body>
</html>
